<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>FinTrack — Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your FinTrack profile and account settings.">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- App Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo-container">
      <div class="logo">FinTrack</div>
      <div class="logo-sub">Profile</div>
    </div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="transactions.html">Transactions</a>
      <a href="categories.html">Categories</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <i data-lucide="moon"></i>
      </button>
      <div class="nav-avatar" onclick="window.location.href='profile.html'" style="border-color: var(--accent-green);"></div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main-content">

    <!-- PROFILE PAGE -->
    <section id="profile"
      style="background: var(--bg-card); padding: 2.5rem; border-radius: 1.5rem; border: 1px solid var(--glass-border);">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <h2 style="margin-top: 0; color: var(--accent-green);">Your Profile</h2>
        <button onclick="handleLogout()"
          style="background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); color: var(--accent-red); padding: 0.5rem 1.25rem; border-radius: 0.75rem; cursor: pointer; font-weight: 600; transition: 0.3s;">Logout</button>
      </div>
      <div style="margin: 2rem 0; display: flex; flex-direction: column; gap: 1rem;">
        <p id="profile-name" style="font-size: 1.1rem; color: var(--text-main);">Username: ...</p>
        <p id="profile-email" style="font-size: 1.1rem; color: var(--text-main);">Email: ...</p>
      </div>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Your data is secured by Firebase.</p>
    </section>

  </main>

  <!-- SCRIPTS -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>
  <script src="app.js"></script>

</body>

</html>
