<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>FinTrack â€” Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Log in or sign up for FinTrack â€” your personal finance tracker.">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- App Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="auth-overlay">
    <div class="auth-card">
      <div class="auth-header">
      <img src="FTLogo2.png" alt="FinTrack Logo" class="logo-img">
        <h2 class="auth-title">Welcome Back</h2>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchAuthMode('login')">Log In</div>
        <div class="auth-tab" id="tab-signup" onclick="switchAuthMode('signup')">Sign Up</div>
      </div>

      <div id="login-form" class="auth-form">
        <input type="text" id="login-username" class="auth-input" placeholder="Email or username">
        <input type="password" id="login-password" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleLogin()">Log In</button>
      </div>

      <div id="signup-form" class="auth-form hidden">
        <div class="segmented-toggle">
          <label class="toggle-option">
            <input type="radio" name="account-type" value="personal" checked>
            <span class="toggle-label">Personal</span>
          </label>
          <label class="toggle-option">
            <input type="radio" name="account-type" value="enterprise">
            <span class="toggle-label">Enterprise</span>
          </label>
        </div>

        <input type="text" id="signup-username" class="auth-input" placeholder="Username (unique)">
        <input type="email" id="signup-email" class="auth-input" placeholder="Email">
        <input type="password" id="signup-password" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="handleSignup()">Sign Up</button>
      </div>

      <div id="auth-error" class="auth-error"></div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="shared.js"></script>

</body>

</html>
