<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>FinTrack — Enterprise Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FinTrack Enterprise Dashboard — Business financial overview, revenue, expenses, and assets.">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- Choices.js CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />

  <!-- App Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo-container">
      <div class="logo">FinTrack</div>
      <div class="logo-sub">Enterprise</div>
    </div>
    <div class="nav-links">
      <a href="enterprise-dashboard.html" class="active">Dashboard</a>
      <a href="enterprise-transactions.html">Transactions</a>
      <a href="enterprise-categories.html">Categories</a>
      <a href="bills.html">Bills</a>
      <a href="assets.html">Assets</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <i data-lucide="moon"></i>
      </button>
      <div class="nav-avatar" onclick="window.location.href='profile.html'"></div>
      <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main-content">

    <!-- ENTERPRISE DASHBOARD -->
    <section id="dashboard">
      <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <h1 id="user-welcome" style="font-size: 1.5rem; margin: 0; color: var(--text-main);">Welcome back👋</h1>
          <div class="enterprise-badge">Enterprise</div>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <a href="FinTrack.apk" download class="hero-add-btn" style="text-decoration: none; padding: 0.5rem 1rem; width: auto; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.5rem; background: #3ddc84; color: #000; border: none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M17.523 15.3414C17.523 16.0305 16.9642 16.5893 16.275 16.5893C15.5859 16.5893 15.027 16.0305 15.027 15.3414C15.027 14.6522 15.5859 14.0934 16.275 14.0934C16.9642 14.0934 17.523 14.6522 17.523 15.3414ZM8.9729 16.5893C8.2837 16.5893 7.7249 16.0305 7.7249 15.3414C7.7249 14.6522 8.2837 14.0934 8.9729 14.0934C9.6621 14.0934 10.221 14.6522 10.221 15.3414C10.221 16.0305 9.6621 16.5893 8.9729 16.5893ZM17.9715 10.8712L19.8247 7.6631C19.9248 7.4891 19.8661 7.2657 19.6922 7.1656C19.5182 7.0654 19.2947 7.1242 19.1946 7.2982L17.3101 10.5606C15.7533 9.8437 13.9829 9.4267 12.124 9.4267C10.2652 9.4267 8.4947 9.8437 6.938 10.5606L5.0534 7.2982C4.9533 7.1242 4.7299 7.0654 4.5559 7.1656C4.3819 7.2657 4.3232 7.4891 4.4233 7.6631L6.2766 10.8712C2.756 12.81 0.3541 16.4022 0 20.6696H24.248C23.894 16.4022 21.492 12.81 17.9715 10.8712Z"/></svg> Android
          </a>
          <a href="FinTrack.ipa" download class="hero-add-btn" style="text-decoration: none; padding: 0.5rem 1rem; width: auto; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.5rem; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--glass-border);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M16.149 12.0125C16.1774 10.1557 17.6583 9.2435 17.7288 9.1979C16.852 7.9177 15.5204 7.7411 15.0505 7.7126C13.9056 7.5959 12.7845 8.3845 12.193 8.3845C11.5878 8.3845 10.6698 7.724 9.7118 7.7383C8.4842 7.7554 7.3421 8.451 6.7139 9.5517C5.4337 11.7801 6.3867 15.0747 7.6409 16.8927C8.2541 17.7818 8.9669 18.7849 9.9084 18.7478C10.8214 18.7107 11.1714 18.1578 12.2612 18.1578C13.3368 18.1578 13.6584 18.7478 14.614 18.7278C15.5838 18.7107 16.2085 17.8217 16.8075 16.924C17.5005 15.9182 17.7885 14.938 17.8028 14.8867C17.7772 14.8781 16.1205 14.2478 16.149 12.0125ZM13.8868 6.1362C14.3903 5.5246 14.7317 4.6865 14.6376 3.8428C13.9149 3.8713 13.0188 4.3263 12.4954 4.9293C12.0261 5.4639 11.6251 6.326 11.7334 7.1537C12.5401 7.2165 13.3838 6.7472 13.8868 6.1362Z"/></svg> iOS
          </a>
        </div>
      </div>

      <!-- Summary Cards -->
      <div class="enterprise-summary-grid">
        <div class="summary-card summary-revenue">
          <div class="summary-icon"><i data-lucide="trending-up"></i></div>
          <div class="summary-info">
            <div class="summary-label">Total Revenue</div>
            <div class="summary-value" id="total-revenue">₹0</div>
          </div>
        </div>
        <div class="summary-card summary-expense">
          <div class="summary-icon"><i data-lucide="trending-down"></i></div>
          <div class="summary-info">
            <div class="summary-label">Total Expenses</div>
            <div class="summary-value" id="total-expenses">₹0</div>
          </div>
        </div>
        <div class="summary-card summary-assets">
          <div class="summary-icon"><i data-lucide="landmark"></i></div>
          <div class="summary-info">
            <div class="summary-label">Asset Value</div>
            <div class="summary-value" id="total-asset-value">₹0</div>
          </div>
        </div>
        <div class="summary-card summary-bills">
          <div class="summary-icon"><i data-lucide="receipt"></i></div>
          <div class="summary-info">
            <div class="summary-label">Total Bills</div>
            <div class="summary-value" id="total-bills">0</div>
          </div>
        </div>
        <div class="summary-card summary-count">
          <div class="summary-icon"><i data-lucide="boxes"></i></div>
          <div class="summary-info">
            <div class="summary-label">Asset Count</div>
            <div class="summary-value" id="asset-count">0</div>
          </div>
        </div>
      </div>

      <div class="chart-container">
        <div class="chart-box"><canvas id="pieChart"></canvas></div>
        <div class="chart-box"><canvas id="barChart"></canvas></div>
      </div>
    </section>

  </main>

  <!-- MODAL STRUCTURE -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="toggleAddTxSection()"></div>
  <div class="add-transaction-section" id="addTxSection">
    <div class="modal-header">
      <h2>Add Enterprise Transaction</h2>
      <div class="close-modal" onclick="toggleAddTxSection()"><i data-lucide="x" style="width: 24px; height: 24px;"></i></div>
    </div>
    <div class="transaction-form">
      <div class="form-group">
        <label class="field-label">Amount</label>
        <input id="amount" type="number" placeholder="0.00" min="0.01" step="0.01">
        <span id="amount-error"
          style="color: var(--accent-red); font-size: 0.8rem; margin-top: 0.5rem; height: 1.1rem; display: block;"></span>
      </div>
      <div class="form-group">
        <label class="field-label">Bill Number <span style="color: var(--accent-red);">*</span></label>
        <input id="bill-number" type="text" placeholder="Enter bill number (e.g. INV-1023)">
      </div>
      <div class="form-group">
        <label class="field-label">Category</label>
        <select id="category">
          <optgroup label="Income">
            <option value="Revenue">Revenue</option>
            <option value="Client Payments">Client Payments</option>
          </optgroup>
          <optgroup label="Operations">
            <option value="Accounts Receivable">Accounts Receivable</option>
            <option value="Accounts Payable">Accounts Payable</option>
            <option value="Payroll">Payroll</option>
            <option value="Rent / Lease">Rent / Lease</option>
            <option value="Utilities">Utilities</option>
            <option value="Taxes">Taxes</option>
          </optgroup>
          <optgroup label="Business Costs">
            <option value="Software / SaaS">Software / SaaS</option>
            <option value="Office Supplies">Office Supplies</option>
            <option value="Travel">Travel</option>
            <option value="Marketing">Marketing</option>
            <option value="Insurance">Insurance</option>
            <option value="Legal / Compliance">Legal / Compliance</option>
          </optgroup>
          <optgroup label="Assets & Inventory">
            <option value="Equipment">Equipment</option>
            <option value="Maintenance">Maintenance</option>
            <option value="Inventory">Inventory</option>
            <option value="Assets">Assets</option>
          </optgroup>
          <optgroup label="Payments">
            <option value="Vendor Payments">Vendor Payments</option>
          </optgroup>
          <optgroup label="Other">
            <option value="Liabilities">Liabilities</option>
            <option value="Miscellaneous Business Expenses">Miscellaneous Business Expenses</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label class="field-label">Notes</label>
        <input id="note" type="text" placeholder="Add a brief note...">
      </div>
      <button class="hero-add-btn" onclick="addEnterpriseTransaction()"><i data-lucide="plus"></i> Add Transaction</button>
    </div>
  </div>

  <!-- FAB -->
  <div class="fab" id="fabAdd" onclick="toggleAddTxSection()"><i data-lucide="plus"></i></div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script src="shared.js"></script>
  <script src="enterprise.js"></script>

</body>

</html>
